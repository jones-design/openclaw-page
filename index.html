<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw | Racer Tech</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #f1f5f9;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .container {
    padding: 40px;
    max-width: 600px;
  }
  h1 {
    font-size: 2.5rem;
    margin-bottom: 16px;
    letter-spacing: 1px;
  }
  p {
    font-size: 1.1rem;
    color: #94a3b8;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .badge {
    display: inline-block;
    padding: 6px 16px;
    border: 1px solid #334155;
    border-radius: 999px;
    font-size: 0.85rem;
    color: #64748b;
    margin-bottom: 24px;
  }
  a.button {
    display: inline-block;
    background: #38bdf8;
    color: #0f172a;
    padding: 12px 28px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    transition: opacity 0.2s;
  }
  a.button:hover { opacity: 0.85; }
  footer {
    margin-top: 40px;
    font-size: 0.8rem;
    color: #475569;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="badge">openclaw.racer-tech.com</div>

</html>
